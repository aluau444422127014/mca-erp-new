{% extends "base.html" %}
{% block content %}

<h2 class="title">Student Performance Dashboard</h2>

<!-- 🔷 STUDENT INFO -->
{% if student %}
<div class="card info-card">
    <h3>{{ student[1] }}</h3>
    <p><b>Reg No:</b> {{ student[2] }}</p>
    <p><b>Dept:</b> {{ student[5] }}</p>
</div>
{% endif %}

<!-- 🔷 STAFF SELECT -->
{% if role == "staff" %}
<div class="card">
    <form method="GET" action="/home">
        <input name="regno" placeholder="Enter Reg No" required>
        <button>Load Student</button>
    </form>
</div>
{% endif %}

<!-- 🔷 GRAPHS -->
<div class="grid">

    <div class="card">
        <h3>Attendance Trend</h3>
        <canvas id="attChart"></canvas>
    </div>

    <div class="card">
        <h3>Marks Trend</h3>
        <canvas id="marksChart"></canvas>
    </div>

</div>

<!-- 🔥 CHART JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

// 🔥 ATTENDANCE DATA
let attDates = [];
let attValues = [];

{% if attendance %}
    {% for a in attendance %}
        attDates.push("{{ a[0] }}");

        {% if a[1] == "Present" %}
            attValues.push(1);
        {% else %}
            attValues.push(0);
        {% endif %}
    {% endfor %}
{% endif %}

// 🔥 ATTENDANCE CHART
new Chart(document.getElementById("attChart"), {
    type: "line",
    data: {
        labels: attDates,
        datasets: [{
            label: "Attendance (1=Present, 0=Absent)",
            data: attValues,
            fill: false,
            tension: 0.3
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                beginAtZero: true,
                ticks: {
                    stepSize: 1
                }
            }
        }
    }
});


// 🔥 MARKS DATA
let subjectLabels = [];
let marksValues = [];

{% if marks %}
    {% for m in marks %}
        subjectLabels.push("{{ m[0] }}");
        marksValues.push({{ m[2]|default(0) }});
    {% endfor %}
{% endif %}

// 🔥 MARKS CHART
new Chart(document.getElementById("marksChart"), {
    type: "line",
    data: {
        labels: subjectLabels,
        datasets: [{
            label: "Marks",
            data: marksValues,
            fill: false,
            tension: 0.3
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});

</script>

<style>

/* 🔥 BODY BG */
body{
    background: linear-gradient(135deg, #0f172a, #020617);
    color: #e2e8f0;
}

/* 🔥 TITLE */
.title{
    text-align:center;
    margin-bottom:30px;
    font-size:28px;
    font-weight:bold;
    letter-spacing:1px;
}

/* 🔥 GLASS CARD */
.card{
    background: rgba(255,255,255,0.05);
    padding:20px;
    border-radius:15px;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    margin-bottom:20px;
    transition:0.3s;
}

.card:hover{
    transform: translateY(-5px);
}

/* 🔥 STUDENT INFO CARD */
.info-card{
    text-align:center;
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    color:white;
}

.info-card h3{
    margin:0;
    font-size:22px;
}

/* 🔥 GRID */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
    gap:20px;
}

/* 🔥 INPUT */
input{
    padding:10px;
    width:65%;
    border-radius:8px;
    border:none;
    outline:none;
    background:#1e293b;
    color:white;
}

/* 🔥 BUTTON */
button{
    padding:10px 15px;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background: linear-gradient(135deg, #0ea5e9, #0284c7);
}

/* 🔥 CHART BOX FIX */
canvas{
    margin-top:15px;
}

</style>

{% endblock %}
