{% extends "base.html" %}
{% block content %}

<h2>Announcement</h2>

{% if session['role'] == 'staff' %}
<form method="POST" enctype="multipart/form-data">
    <input type="file" name="image">
    <button>Upload</button>
</form>
{% endif %}

{% for img, d in data %}
<div>
    <p>{{ d }}</p>
    <img src="/static/{{ img }}" width="300">
</div>
{% endfor %}

{% endblock %}
