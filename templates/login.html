<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg,#0f172a,#020617);
    font-family: Arial;
}

/* 🔥 GLASS CARD */
.login-box {
    width: 350px;
    padding: 30px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    text-align: center;
}

/* 🔥 TABS */
.tabs {
    display: flex;
    margin-bottom: 20px;
}

.tabs button {
    flex: 1;
    padding: 10px;
    background: #1e293b;
    color: white;
    border: none;
    cursor: pointer;
}

.tabs .active {
    background: #38bdf8;
    color: black;
}

/* 🔥 INPUT */
.input-box {
    background: #020617;
    margin: 10px 0;
    padding: 10px;
    border-radius: 6px;
}

.input-box input {
    width: 100%;
    border: none;
    background: transparent;
    color: white;
    outline: none;
}

/* 🔥 BUTTON */
.login-btn {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    background: #38bdf8;
    border: none;
    color: black;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
}

.login-btn:hover {
    background: #0ea5e9;
}

a {
    color: #a78bfa;
    text-decoration: none;
}

form { display:none; }
form.active { display:block; }

</style>
</head>

<body>

<div class="login-box">

<div class="tabs">
    <button id="staffTab" class="active" onclick="switchForm('staff')">Staff</button>
    <button id="studentTab" onclick="switchForm('student')">Student</button>
</div>

<!-- 🔥 STAFF -->
<form method="POST" action="/login" id="staffForm" class="active">
<input type="hidden" name="role" value="staff">

<div class="input-box">
<input name="username" placeholder="Username" required>
</div>

<div class="input-box">
<input type="password" name="password" placeholder="Password" required>
</div>

<button class="login-btn">LOGIN</button>
</form>

<!-- 🔥 STUDENT -->
<form method="POST" action="/login" id="studentForm">
<input type="hidden" name="role" value="student">

<div class="input-box">
<input name="username" placeholder="Register No" required>
</div>

<div class="input-box">
<input type="password" name="password" placeholder="Password" required>
</div>

<button class="login-btn">LOGIN</button>
</form>

<p style="margin-top:15px;">
<a href="/register">Create Account</a>
</p>

</div>

<script>
function switchForm(type){
    document.getElementById("staffForm").classList.remove("active");
    document.getElementById("studentForm").classList.remove("active");
    document.getElementById("staffTab").classList.remove("active");
    document.getElementById("studentTab").classList.remove("active");

    if(type==="staff"){
        document.getElementById("staffForm").classList.add("active");
        document.getElementById("staffTab").classList.add("active");
    } else {
        document.getElementById("studentForm").classList.add("active");
        document.getElementById("studentTab").classList.add("active");
    }
}
</script>

<!-- 🔥 JS ERROR POPUP -->
{% if error %}
<script>
alert("{{ error }}");
</script>
{% endif %}

</body>
</html>
