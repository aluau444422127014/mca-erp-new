<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
}

/* CENTER BOX */
.container {
    width: 400px;
    margin: 80px auto;
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

/* TABS */
.tabs {
    display: flex;
    margin-bottom: 20px;
}

.tabs button {
    flex: 1;
    padding: 10px;
    background: #1e293b;
    color: white;
    border: none;
    cursor: pointer;
}

.tabs button.active {
    background: #38bdf8;
    color: black;
}

/* FORM */
form {
    display: none;
}

form.active {
    display: block;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: #38bdf8;
    border: none;
    cursor: pointer;
}
</style>

</head>
<body>

<div class="container">

    <!-- 🔥 TABS -->
    <div class="tabs">
        <button onclick="showForm('staff')" id="staffTab" class="active">Staff</button>
        <button onclick="showForm('student')" id="studentTab">Student</button>
    </div>

    <!-- 🔥 STAFF FORM -->
    <form method="POST" action="/login" id="staffForm" class="active">
        <input type="hidden" name="role" value="staff">

        <input name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <!-- 🔥 STUDENT FORM -->
    <form method="POST" action="/login" id="studentForm">
        <input type="hidden" name="role" value="student">

        <input name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

</div>

<script>
function showForm(type){

    document.getElementById("staffForm").classList.remove("active");
    document.getElementById("studentForm").classList.remove("active");

    document.getElementById("staffTab").classList.remove("active");
    document.getElementById("studentTab").classList.remove("active");

    if(type === "staff"){
        document.getElementById("staffForm").classList.add("active");
        document.getElementById("staffTab").classList.add("active");
    } else {
        document.getElementById("studentForm").classList.add("active");
        document.getElementById("studentTab").classList.add("active");
    }
}
</script>

</body>
</html>
