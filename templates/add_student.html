{% extends "base.html" %}
{% block content %}

<h2 style="text-align:center;">Add Student</h2>

<form action="/add_student" method="POST" class="form-card">

<input name="name" placeholder="Name" required>
<input name="regno" placeholder="Reg No" required>

<input type="date" name="admission">

<input type="hidden" name="year" value="{{ year }}">

<input name="dept" placeholder="Dept">
<input name="phone" placeholder="Phone">

<input name="parent" placeholder="Parent">
<input name="address" placeholder="Address">

<select name="assignment">
<option>Yes</option>
<option>No</option>
</select>

<input type="number" name="batch_year" placeholder="Batch Year" required>

<button type="submit">Save</button>

</form>

{% endblock %}
