{% extends "base.html" %}
{% block content %}
<style>

.page-title{
    text-align: center;
    color: white;
    margin-bottom: 35px;
    font-size: 42px;
    font-weight: bold;
    letter-spacing: 1px;
}

/* MAIN CONTAINER */
.form-container{
    width: 90%;
    max-width: 1100px;
    margin: auto;

    background: rgba(15, 15, 25, 0.72);

    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    padding: 45px;
    border-radius: 28px;

    border: 1px solid rgba(255,255,255,0.08);

    box-shadow:
        0 8px 32px rgba(0,0,0,0.45),
        inset 0 0 1px rgba(255,255,255,0.15);
}

/* FORM TITLE */
.form-card h2{
    text-align: center;
    margin-bottom: 40px;
    color: white;
    font-size: 34px;
    font-weight: bold;
}

/* GRID */
.form-grid{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px;
}

/* GROUP */
.form-group{
    display: flex;
    flex-direction: column;
}

/* LABEL */
.form-group label{
    margin-bottom: 8px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    font-size: 15px;
}

/* INPUT + SELECT */
.form-group input,
.form-group select{
    width: 100%;
    padding: 15px 16px;

    border-radius: 14px;

    border: 1px solid rgba(255,255,255,0.12);

    background: rgba(255,255,255,0.08);

    color: white;

    font-size: 16px;

    outline: none;

    box-sizing: border-box;

    transition: 0.3s;
}

/* PLACEHOLDER */
.form-group input::placeholder{
    color: rgba(255,255,255,0.55);
}

/* FOCUS */
.form-group input:focus,
.form-group select:focus{
    border-color: #00c6ff;

    background: rgba(255,255,255,0.12);

    box-shadow: 0 0 10px rgba(0,198,255,0.3);
}

/* SELECT OPTION */
.form-group select option{
    background: #111827;
    color: white;
}

/* FILE INPUT */
.form-group input[type="file"]{
    padding: 12px;
    cursor: pointer;
}

/* FULL WIDTH */
.full-width{
    grid-column: span 2;
}

/* BUTTON */
.submit-btn{
    width: 100%;

    padding: 16px;

    border: none;

    border-radius: 15px;

    background: linear-gradient(90deg,#00c6ff,#0072ff);

    color: white;

    font-size: 18px;

    font-weight: bold;

    cursor: pointer;

    transition: 0.3s;

    margin-top: 10px;
}

/* BUTTON HOVER */
.submit-btn:hover{
    transform: translateY(-2px) scale(1.01);

    box-shadow: 0 10px 25px rgba(0,114,255,0.35);
}

/* MOBILE */
@media(max-width:768px){

    .form-grid{
        grid-template-columns: 1fr;
    }

    .full-width{
        grid-column: span 1;
    }

    .form-container{
        padding: 25px;
    }

    .page-title{
        font-size: 32px;
    }

    .form-card h2{
        font-size: 26px;
    }

}

</style>

<h2 class="page-title">Add Student</h2>

<div class="form-container">

<form action="/save_student_form"
      method="POST"
      enctype="multipart/form-data"
      class="form-card">

<h2>Manual Student Admission</h2>

<div class="form-grid">

    <div class="form-group">
        <label>Register Number</label>
        <input type="text" name="regno" placeholder="Register Number" required>
    </div>

    <div class="form-group">
        <label>Batch Year</label>
        <input type="text" name="batch" placeholder="Batch Year (2025)" required>
    </div>

    <div class="form-group">
        <label>Student Name</label>
        <input type="text" name="name" placeholder="Student Name" required>
    </div>

    <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" name="dob" required>
    </div>

    <div class="form-group">
        <label>Phone Number</label>
        <input type="text" name="phone" placeholder="Phone Number" required>
    </div>

    <div class="form-group">
        <label>10th Percentage</label>
        <input type="text" name="tenth_mark" placeholder="10th Percentage">
    </div>

    <div class="form-group">
        <label>12th Percentage</label>
        <input type="text" name="twelfth_mark" placeholder="12th Percentage">
    </div>

    <div class="form-group">
        <label>UG Percentage</label>
        <input type="text" name="ug_mark" placeholder="UG Percentage">
    </div>

    <div class="form-group">
        <label>Aadhar Number</label>
        <input type="text" name="aadhar" placeholder="Aadhar Number">
    </div>

    <div class="form-group">
        <label>UMIS Number</label>
        <input type="text" name="umis" placeholder="UMIS Number">
    </div>

    <div class="form-group">
        <label>Department</label>
        <select name="department" required>
            <option value="">Select Department</option>
            <option>MCA</option>
        </select>
    </div>

    <div class="form-group">
        <label>Year</label>
        <select name="year" required>
            <option value="">Select Year</option>
            <option value="1">First Year</option>
            <option value="2">Second Year</option>
        </select>
    </div>

    <div class="form-group">
        <label>Admission Date</label>
        <input type="date" name="admission_date">
    </div>

    <div class="form-group">
        <label>Place</label>
        <input type="text" name="place" placeholder="Place">
    </div>

    <div class="form-group">
        <label>District</label>
        <input type="text" name="district" placeholder="District">
    </div>

    <div class="form-group">
        <label>Pincode</label>
        <input type="text" name="pincode" placeholder="Pincode">
    </div>

    <div class="form-group">
        <label>State</label>
        <input type="text" name="state" placeholder="State">
    </div>

    <div class="form-group">
        <label>Upload 10th Marksheet</label>
        <input type="file" name="tenth_file">
    </div>

    <div class="form-group">
        <label>Upload 12th Marksheet</label>
        <input type="file" name="twelfth_file">
    </div>

    <div class="form-group">
        <label>Upload Aadhar</label>
        <input type="file" name="aadhar_file">
    </div>

    <div class="form-group">
        <label>Upload Transfer Certificate</label>
        <input type="file" name="tc_file">
    </div>

    <div class="form-group full-width">
        <label>Upload Degree Certificate</label>
        <input type="file" name="degree_file">
    </div>

    <div class="full-width">
        <button type="submit" class="submit-btn">
            Save Student Details
        </button>
    </div>

</div>

</form>

</div>

{% endblock %}
