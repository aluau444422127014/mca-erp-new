<!DOCTYPE html>
<html>

<head>
    <title>Student Admission Form</title>

    <style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#020024,#090979,#6a11cb);
    min-height: 100vh;
    padding: 40px 20px;
    color: white;
}

/* MAIN CONTAINER */

.box{
    width: 95%;
    max-width: 1200px;
    margin: auto;

    background: rgba(255,255,255,0.08);

    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border: 1px solid rgba(255,255,255,0.1);

    border-radius: 25px;

    padding: 40px;

    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
}

/* TITLE */

h2{
    text-align: center;
    font-size: 40px;
    margin-bottom: 40px;
    color: white;
}

/* GRID */

.grid{
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 25px;
}

/* INPUTS */

input,
select{
    width: 100%;
    padding: 16px 18px;

    border: none;
    outline: none;

    border-radius: 14px;

    background: rgba(255,255,255,0.12);

    color: white;

    font-size: 16px;

    backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.08);

    transition: 0.3s;
}

/* PLACEHOLDER */

input::placeholder{
    color: rgba(255,255,255,0.7);
}

/* SELECT */

select{
    color: white;
}

select option{
    background: #111;
    color: white;
}

/* INPUT FOCUS */

input:focus,
select:focus{
    border: 1px solid #00c6ff;
    box-shadow: 0 0 10px rgba(0,198,255,0.5);
}

/* FILE LABEL */

.file-box{
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.file-box label{
    color: white;
    font-size: 15px;
    font-weight: bold;
}

/* FILE INPUT */

input[type="file"]{
    padding: 12px;
    cursor: pointer;
}

/* BUTTON */

button{
    margin-top: 35px;

    width: 100%;

    padding: 18px;

    border: none;
    border-radius: 15px;

    background: linear-gradient(90deg,#00c6ff,#0072ff);

    color: white;

    font-size: 18px;
    font-weight: bold;

    cursor: pointer;

    transition: 0.3s;
}

/* BUTTON HOVER */

button:hover{
    transform: scale(1.02);
    box-shadow: 0 0 20px rgba(0,198,255,0.4);
}

/* MOBILE */

@media(max-width:900px){

    .grid{
        grid-template-columns: 1fr;
    }

    h2{
        font-size: 30px;
    }

    .box{
        padding: 25px;
    }

}

</style>
</head>

<body>

<div class="box">

    <h2>Student Admission Form</h2>

    <form action="/save_student_form" method="POST" enctype="multipart/form-data">

        <div class="grid">

            <!-- REGNO + BATCH -->
            <input type="text" name="regno" placeholder="Register Number" required>

            <input type="text" name="batch" placeholder="Batch" required>

            <!-- BASIC -->
            <input type="text" name="name" placeholder="Student Name" required>

            <input type="date" name="dob" required>

            <input type="text" name="phone" placeholder="Phone Number" required>

            <input type="text" name="umis" placeholder="UMIS Number">

            <!-- MARKS -->
            <input type="text" name="tenth_mark" placeholder="10th Percentage">

            <input type="text" name="twelfth_mark" placeholder="12th Percentage">

            <input type="text" name="ug_mark" placeholder="UG Percentage">

            <input type="text" name="aadhar" placeholder="Aadhar Number">

            <!-- DEPARTMENT -->
            <select name="department" required>
                <option value="">Select Department</option>
                <option>MCA</option>
            </select>

            <!-- YEAR -->
            <select name="year" required>
                <option value="">Select Year</option>
                <option value="1">First Year</option>
                <option value="2">Second Year</option>
            </select>

            <input type="date" name="admission_date">

            <input type="text" name="place" placeholder="Place">

            <!-- DISTRICT -->
            <input type="text" name="district" placeholder="District">

            <input type="text" name="pincode" placeholder="Pincode">

            <input type="text" name="state" placeholder="State">

            <!-- FILES -->
            <label>Upload 10th Marksheet</label>
            <input type="file" name="tenth_file">

            <label>Upload 12th Marksheet</label>
            <input type="file" name="twelfth_file">

            <label>Upload Aadhar</label>
            <input type="file" name="aadhar_file">

            <label>Upload TC</label>
            <input type="file" name="tc_file">

            <label>Upload Degree</label>
            <input type="file" name="degree_file">

        </div>

        <button type="submit">
            Submit Student Details
        </button>

    </form>

</div>

</body>
</html>
