<!DOCTYPE html>
<html>
<head>
    <title>Subjects</title>

    <style>

/* 🔥 BODY */
body{
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #020617);
    padding: 20px;
    color: #e2e8f0;
}

/* 🔥 TITLE */
h2{
    text-align:center;
    margin-bottom: 20px;
}

/* 🔥 GLASS BOX */
.box{
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    margin-bottom: 20px;
    transition: 0.3s;
}

.box:hover{
    transform: translateY(-3px);
}

/* 🔥 INPUT */
input{
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #1e293b;
    color: white;
}

/* 🔥 BUTTON */
button{
    padding: 8px 15px;
    border: none;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover{
    background: linear-gradient(135deg, #0ea5e9, #0284c7);
}

/* 🔥 TABLE */
table{
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th{
    background: rgba(255,255,255,0.08);
    padding: 12px;
    text-align: left;
}

td{
    padding: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* 🔥 ROW HOVER */
tr:hover{
    background: rgba(255,255,255,0.05);
}

/* 🔥 KEY BOX */
.key-box{
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

/* 🔥 EMPTY TEXT */
.empty{
    color: #94a3b8;
    text-align: center;
    margin-top: 10px;
}

/* 🔥 REMOVE BUTTON SPECIAL */
button:last-child{
    background: linear-gradient(135deg, #ef4444, #dc2626);
}

button:last-child:hover{
    background: linear-gradient(135deg, #dc2626, #b91c1c);
}

</style>
</head>

<body>
<div class="back-btn" onclick="goBack()">
    ⬅
</div>
<h2> Semester {{ sem }}</h2>

<!-- 🔥 STAFF ONLY: ADD SUBJECT -->
{% if session.get("role") == "staff" %}
<div class="box">
    <h3>Add Subject</h3>

    <form action="/add_subject" method="POST">
        <input type="hidden" name="semester" value="{{ sem }}">

        <input name="name" placeholder="Subject Name" required>
        <input name="key" placeholder="Access Key" required>

        <button type="submit">Add</button>
    </form>
</div>
{% endif %}

<!-- 🔥 SUBJECT LIST -->
<div class="box">

{% if subjects %}

<table>
<tr>
    <th>Subject</th>
    <th>Access</th>
</tr>

{% for s in subjects %}
<tr>
    <td>{{ s[1] }}</td>

    <td>
        {% if session.get("role") == "staff" %}
            <!-- 🔐 STAFF: key required -->
            <form action="/open_subject/{{ s[0] }}" method="POST" class="key-box">
                <input type="password" name="key" placeholder="Enter Key" required>
                <button type="submit">Open</button>
            </form>

            <form action="/delete_subject/{{ s[0] }}" method="POST" style="display:inline;">
            <button onclick="return confirm('Delete subject?')">❌ Remove</button>
        </form>

        {% else %}
            <!-- 🎓 STUDENT: no key -->
            <form action="/open_subject/{{ s[0] }}" method="POST">
                <button type="submit">Open</button>
            </form>


        {% endif %}


    </td>
</tr>
{% endfor %}

</table>

{% else %}
<p class="empty">No subjects added yet</p>
{% endif %}

</div>
<script>function goBack(){
    window.history.back();
}
</script>
</body>
</html>
