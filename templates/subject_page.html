<!DOCTYPE html>
<html>
<head>
    <title>Subject Page</title>

    <style>

/* 🔥 BODY */
body{
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #020617);
    padding: 20px;
    color: #e2e8f0;
}

/* 🔥 TITLE */
h2{
    text-align: center;
    margin-bottom: 20px;
}

/* 🔥 GLASS CARD */
.box{
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    margin-bottom: 20px;
    transition: 0.3s;
}

.box:hover{
    transform: translateY(-3px);
}

/* 🔥 INPUT + SELECT */
input, select{
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #1e293b;
    color: white;
}

/* 🔥 BUTTON */
button{
    padding: 8px 15px;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover{
    background: linear-gradient(135deg, #0ea5e9, #0284c7);
}

/* 🔥 TABLE */
table{
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

/* 🔥 TABLE HEADER */
th{
    background: rgba(255,255,255,0.08);
    padding: 12px;
    text-align: left;
}

/* 🔥 TABLE DATA */
td{
    padding: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* 🔥 ROW HOVER */
tr:hover{
    background: rgba(255,255,255,0.05);
}

/* 🔥 READ ONLY (student view) */
.readonly{
    color: #94a3b8;
    font-weight: bold;
}

/* 🔥 INPUT INSIDE TABLE */
td input{
    width: 80px;
    text-align: center;
}

/* 🔥 LABEL */
label{
    font-weight: bold;
    margin-right: 10px;
}

</style>
</head>

<body>
<div class="back-btn" onclick="goBack()">
    ⬅
</div>
<h2> Subject</h2>

<!-- 🔥 Batch Filter -->
<div class="box">
<form method="GET">
    <input name="batch" placeholder="Enter Batch (2025)" value="{{ batch }}">
    <input type="hidden" name="exam" value="{{ selected_exam }}">
    <button type="submit">Load Students</button>
</form>
</div>

<!-- 🔥 STUDENTS + MARKS -->
<div class="box">

<form method="GET">

    <!-- 🔥 BATCH preserve -->
    <input type="hidden" name="batch" value="{{ request.args.get('batch', '') }}">

    <label>Select Exam:</label>

    <!-- 🔥 EXAM DROPDOWN -->
    <select name="exam" onchange="this.form.submit()">

        <option value="IIT1" {{ 'selected' if selected_exam == 'IIT1' else '' }}>IIT1</option>

        <option value="IIT2" {{ 'selected' if selected_exam == 'IIT2' else '' }}>IIT2</option>

        <option value="IIT3" {{ 'selected' if selected_exam == 'IIT3' else '' }}>IIT3</option>

        <option value="MODEL" {{ 'selected' if selected_exam == 'MODEL' else '' }}>MODEL</option>

        <option value="SEM" {{ 'selected' if selected_exam == 'SEM' else '' }}>SEM</option>

    </select>

</form>

<br>

<form action="/save_marks" method="POST">

<input type="hidden" name="sid" value="{{ sid }}">
<input type="hidden" name="exam" value="{{ selected_exam }}">

<table>
<tr>
    <th>Name</th>
    <th>Reg No</th>
    <th>Marks ({{ selected_exam }})</th>
</tr>

{% for s in students %}
<tr>
    <td>{{ s[0] }}</td>
    <td>{{ s[1] }}</td>

    <td>
        {% if role == "staff" %}
            <input name="marks_{{ s[1] }}"
                   value="{{ marks.get(s[1], {}).get(selected_exam, '') }}">
        {% else %}
            <span class="readonly">
                {{ marks.get(s[1], {}).get(selected_exam, '-') }}
            </span>
        {% endif %}
    </td>
</tr>
{% endfor %}

</table>

{% if role == "staff" %}
<br>
<button type="submit">Save Marks</button>
{% endif %}

</form>

</div>
<script>function goBack(){
    window.history.back();
}
</script>
</body>
</html>
